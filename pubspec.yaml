name: checksheet_final
description: "A new Flutter project for checklist management with Excel and PDF support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  excel: ^4.0.6
  file_picker: ^6.1.1
  flutter_pdfview: ^1.3.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  intl: ^0.19.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
