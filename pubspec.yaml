name: checksheet
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  excel: ^4.0.6
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path: ^1.9.0
  file_picker: ^8.1.7
  # ❗ 우리가 성공했던 그 최신 엔진으로 복구
  pdfrx: ^2.2.24

# ❗ [핵심 해결책] 라이브러리 간의 버전 전쟁을 강제로 끝냄
dependency_overrides:
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
