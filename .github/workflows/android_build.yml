name: Flutter Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.3'

      - name: Initialize Flutter Project Structure
        run: |
          mkdir temp_project
          mv lib pubspec.yaml temp_project/
          find . -maxdepth 1 ! -name "." ! -name ".." ! -name ".git" ! -name "backup_kivy" -exec rm -rf {} +
          flutter create . --org org.example --project-name checksheet_final --overwrite
          rm -rf lib/*
          cp -r temp_project/lib/* lib/
          cp temp_project/pubspec.yaml .

      # ❗ 핵심: 안드로이드 권한 강제 주입 (Manifest 수정)
      - name: Inject Android Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          # 안드로이드 11 이상 지원을 위한 requestLegacyExternalStorage 설정 추가
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/g' android/app/src/main/AndroidManifest.xml
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CheckSheet-Flutter-Release
          path: build/app/outputs/flutter-apk/app-release.apk
