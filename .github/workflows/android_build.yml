name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies (PPA-Free)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3 python3-dev python3-pip \
            openjdk-17-jdk zip unzip autoconf automake libtool \
            pkg-config cmake libncurses5-dev libncursesw5-dev \
            zlib1g-dev libffi-dev libssl-dev libtinfo5

      - name: Install Buildozer and Cython
        run: |
          # PIP 보안 정책 무시하고 설치
          pip3 install --user --upgrade "cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          # 라이선스 자동 동의 및 빌드 실행
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CheckSheet-Final-Debug
          path: bin/*.apk
