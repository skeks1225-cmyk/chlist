name: Flutter Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Reconstruct Standard Flutter Project
        run: |
          # 1. 현재 내용을 임시 폴더로 이동
          mkdir temp_code
          mv lib pubspec.yaml temp_code/
          
          # 2. Flutter 표준 구조 강제 생성
          flutter create . --org org.example --project-name checksheet_final
          
          # 3. 기존 코드 복구
          mv temp_code/lib/* lib/
          mv temp_code/pubspec.yaml .
          
          # 4. 의존성 설치
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CheckSheet-Flutter-Release
          path: build/app/outputs/flutter-apk/app-release.apk
