name: Flutter Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'

      # ❗ 오직 'pure_smb_test' 프로젝트만 빌드
      - name: Build Pure SMB Test App
        run: |
          cd pure_smb_test
          flutter clean
          flutter pub get
          flutter build apk --release
        
      - name: Upload Test APK
        uses: actions/upload-artifact@v4
        with:
          name: SMB-Scanner-Test-APK
          path: pure_smb_test/build/app/outputs/flutter-apk/app-release.apk
