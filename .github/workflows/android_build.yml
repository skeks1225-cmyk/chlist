name: Flutter Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      # ❗ 핵심: 잘못된 --force 옵션 제거 및 표준 초기화
      - name: Initialize Flutter Project Structure
        run: |
          flutter create . --org org.example --project-name checksheet_final

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CheckSheet-Flutter-Release
          path: build/app/outputs/flutter-apk/app-release.apk
