name: Flutter Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'

      # ❗ 메인 앱 빌드 과정 삭제 (오직 테스트 앱만 진행)
      - name: Build SMB Test App
        run: |
          cd smb_test_app
          flutter clean
          flutter pub get
          flutter build apk --release
        
      - name: Upload Test APK
        uses: actions/upload-artifact@v4
        with:
          name: SMB-Test-APK
          path: smb_test_app/build/app/outputs/flutter-apk/app-release.apk
